site_name: DMX
site_url : https://yanis-kouidri.github.io/DMX/
repo_url: https://github.com/yanis-kouidri/DMX
repo_name: yanis-kouidri/DMX
edit_uri: edit/main/docs/
nav:
  - Home: index.md
  - Mind Map: mindmap.md
  - Subjects: 
    - WSN: subjects/wsn.md
    - Data Mule: subjects/data_mule.md
    - DTN: subjects/dtn.md
    - Edge Computing: subjects/edge_computing.md
    - Multi-RAT: subjects/multi_rat.md
    - UAV: subjects/uav.md
    - Routing: subjects/routing.md
    - Radio: subjects/radio.md
    - LPWAN: subjects/lpwan.md
  - Experimentation:
    - LoRa: experimentation/lora-raspi-esp32.md
  - Simulation: simulation.md
  - Publication: publication.md
  - Glossary: glossary.md
theme:
  name: material
  language: en
  logo: assets/donkey.png
  favicon: assets/donkey.png
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.top
    - navigation.section
    - content.action.edit
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
      scheme: default

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
extra_css:
  - stylesheets/extra.css
  - https://unpkg.com/katex@0/dist/katex.min.css

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mermaid@11.10/dist/mermaid.min.js
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

